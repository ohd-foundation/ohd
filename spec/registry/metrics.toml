# ===========================================================================

[[event_types]]
namespace = "medication"
name = "taken"
description = "Medication dose taken (Connect Android)"
sensitivity = "general"
discoverable_in_quick_log = false
sql_section_header = "medication.*"

  [[event_types.channels]]
  name = "name"
  value_type = "text"
  path = "med.name"

  [[event_types.channels]]
  name = "dose"
  value_type = "real"
  path = "med.dose"

  [[event_types.channels]]
  name = "unit"
  value_type = "text"
  path = "med.unit"

