# food.*
# ===========================================================================

[[event_types]]
namespace = "food"
name = "eaten"
description = "Food intake (Connect Android FoodDetail)"
sensitivity = "lifestyle"
discoverable_in_quick_log = false
sql_section_header = "food.*"
sql_pre_comment_leading_blank = false
sql_pre_comment = """
Flat shape (kcal/carbs/protein/fat/sugar as siblings) per the Connect
Android FoodDetail screen; `std.meal` carries the canonical hierarchical
nutrition group separately."""

  [[event_types.channels]]
  name = "name"
  value_type = "text"

  [[event_types.channels]]
  name = "grams"
  value_type = "real"
  unit = "g"

  [[event_types.channels]]
  name = "kcal"
  value_type = "real"
  unit = "kcal"

  [[event_types.channels]]
  name = "carbs_g"
  value_type = "real"
  unit = "g"

  [[event_types.channels]]
  name = "protein_g"
  value_type = "real"
  unit = "g"

  [[event_types.channels]]
  name = "fat_g"
  value_type = "real"
  unit = "g"

  [[event_types.channels]]
  name = "sugar_g"
  value_type = "real"
  unit = "g"

