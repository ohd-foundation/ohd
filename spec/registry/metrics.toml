# Canonical cross-runtime metrics registry for OHD.
#
# This file is the single source of truth for the measurement / medication /
# food / symptom / activity event types written by the Connect Android app
# (and, eventually, by the iOS app + ingestion endpoints of the SaaS server).
#
# Three consumers regenerate themselves from this file:
#
#   * `storage/migrations/018_connect_android_types.sql` — generated via
#     `storage/tools/regen_migrations.py`. Re-run the script when you edit
#     this file and commit both outputs.
#   * `connect/android/app/src/main/java/com/ohd/connect/data/MetricsRegistry.kt`
#     — same generator emits a Kotlin object so Compose screens can render
#     unit pickers / display labels straight from the registry.
#   * SaaS server (TBD) — will load the TOML at boot to validate inbound
#     event_type strings. Out of scope for v1; the schema is forward-compat.
#
# Editing rules:
#
#   * Per the project memory rule "no backward compatibility — user drops
#     data each install": when adding fields, edit `018` in place via the
#     generator. Don't add a `019_*.sql`.
#   * `discoverable_in_quick_log = true` only on `measurement.*` rows that
#     are first-class in `MeasurementScreen` quick measures. Pain / urine
#     strip have their own dedicated screens so we leave them `false` even
#     though they live in `measurement.*`.
#   * `unit_options` / `default_unit` exist on the *event type* (the user
#     toggles which unit they're entering); individual channel `unit`s are
#     the **storage unit** for that channel.
#   * `custom = true` is reserved for runtime-installed user-defined types
#     (see `Auth.customMetricsV1`). The TOML never contains `custom = true`
#     entries — they live in per-install state.

schema_version = 1

# ===========================================================================
# measurement.*
# ===========================================================================

[[event_types]]
namespace = "measurement"
name = "blood_pressure"
description = "Blood pressure (Connect Android)"
sensitivity = "general"
discoverable_in_quick_log = true
sql_section_header = "measurement.*"

  [[event_types.channels]]
  name = "systolic_mmhg"
  value_type = "real"
  unit = "mmHg"

  [[event_types.channels]]
  name = "diastolic_mmhg"
  value_type = "real"
  unit = "mmHg"

[[event_types]]
namespace = "measurement"
name = "glucose"
description = "Blood glucose (Connect Android)"
sensitivity = "general"
discoverable_in_quick_log = true
unit_options = ["mmol/L", "mg/dL"]
default_unit = "mmol/L"

  [[event_types.channels]]
  name = "value"
  value_type = "real"

  [[event_types.channels]]
  name = "unit"
  value_type = "text"

[[event_types]]
namespace = "measurement"
name = "weight"
description = "Body weight (Connect Android + Health Connect)"
sensitivity = "general"
discoverable_in_quick_log = true
unit_options = ["kg", "lb"]
default_unit = "kg"

  [[event_types.channels]]
  name = "value"
  value_type = "real"

  [[event_types.channels]]
  name = "unit"
  value_type = "text"

  # Health Connect maps WeightRecord → measurement.weight with `kg` channel.
  [[event_types.channels]]
  name = "kg"
  value_type = "real"
  unit = "kg"
  comment = "Health Connect maps WeightRecord → measurement.weight with `kg` channel."

[[event_types]]
namespace = "measurement"
name = "temperature"
description = "Body temperature (Connect Android + Health Connect)"
sensitivity = "general"
discoverable_in_quick_log = true
unit_options = ["°C", "°F"]
default_unit = "°C"

  [[event_types.channels]]
  name = "value"
  value_type = "real"

  [[event_types.channels]]
  name = "unit"
  value_type = "text"

  [[event_types.channels]]
  name = "celsius"
  value_type = "real"
  unit = "C"
  comment = "Health Connect maps BodyTemperatureRecord → measurement.temperature with `celsius`."

[[event_types]]
namespace = "measurement"
name = "heart_rate"
description = "Heart rate sample (Health Connect)"
sensitivity = "general"
discoverable_in_quick_log = false
sql_section_comment = "measurement.heart_rate (Health Connect, per-sample)"

  [[event_types.channels]]
  name = "bpm"
  value_type = "real"
  unit = "bpm"

[[event_types]]
namespace = "measurement"
name = "urine_strip"
description = "Urine dipstick reading (Connect Android UrineStripScreen)"
sensitivity = "general"
discoverable_in_quick_log = false
sql_channel_style = "compact"
sql_section_comment = "measurement.urine_strip (4-analyte panel)"

  [[event_types.channels]]
  name = "glucose"
  value_type = "text"

  [[event_types.channels]]
  name = "ph"
  value_type = "text"

  [[event_types.channels]]
  name = "protein"
  value_type = "text"

  [[event_types.channels]]
  name = "leukocytes"
  value_type = "text"

[[event_types]]
namespace = "measurement"
name = "spo2"
description = "Oxygen saturation (Health Connect)"
sensitivity = "general"
discoverable_in_quick_log = false
sql_section_comment = "measurement.spo2 (Health Connect)"

  [[event_types.channels]]
  name = "percentage"
  value_type = "real"
  unit = "%"

[[event_types]]
namespace = "measurement"
name = "pain"
description = "Pain score NRS 0-10 (Connect Android)"
sensitivity = "general"
discoverable_in_quick_log = false
sql_section_comment = "measurement.pain (Connect Android NRS 0-10)"
sql_pre_comment = """
Connect Android's PainScoreScreen writes 11-point Numeric Rating Scale
entries here. Three channels: `location` (free-text body site),
`severity_nrs` (0-10 real), `severity_label` (bucket label —
"No pain" / "Mild" / "Annoying" / "Distracting" / "Disabling" /
"Unbearable" / "Worst possible")."""

  [[event_types.channels]]
  name = "location"
  value_type = "text"

  [[event_types.channels]]
  name = "severity_nrs"
  value_type = "real"

  [[event_types.channels]]
  name = "severity_label"
  value_type = "text"

