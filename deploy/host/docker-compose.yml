# OHD demo deployment — single-host, single-box on Hetzner ARM (cax11).
#
# Brings up:
#   - ohd-storage   (Rust binary, OHDC over HTTP/2 — HTTP/3 disabled here
#                    because Caddy fronts; raw QUIC works without h3 listener)
#   - ohd-relay     (Rust binary, REST + QUIC tunnel)
#   - caddy         (auto-TLS, reverse proxy, static landing page)
#
# Usage:
#   cd /opt/ohd
#   docker compose -f deploy/host/docker-compose.yml up --build -d
#   docker compose -f deploy/host/docker-compose.yml logs -f
#
# DNS prerequisite: ohd.dev, www.ohd.dev, storage.ohd.dev, relay.ohd.dev,
# openhealthdata.org all A-records → this server's IPv4. Caddy needs them
# in place before issuing certs.

services:
  ohd-storage:
    build:
      context: ../../
      dockerfile: storage/deploy/Dockerfile
    image: ohd-storage:dev
    container_name: ohd-storage
    restart: unless-stopped
    expose:
      - "8443"
    # Light up the OAuth/OIDC IdP endpoints so the Connect Android app can
    # "Sign in to OHD Cloud" against storage.ohd.dev. The upstream provider
    # ohd_account points at accounts.ohd.dev (the ohd-idp container); the
    # storage AS is registered there as `ohd-storage-cloud` with the
    # matching client_secret in OHD_OAUTH_PROVIDER_OHD_ACCOUNT_CLIENT_SECRET
    # (idp side: OHD_IDP_CLIENT_STORAGE_SECRET).
    command:
      - "serve"
      - "--db"
      - "/var/lib/ohd-storage/storage.db"
      - "--listen"
      - "0.0.0.0:8443"
      - "--oauth-issuer"
      - "https://storage.ohd.dev"
      - "--oauth-provider"
      - "ohd_account=https://accounts.ohd.dev"
    volumes:
      - storage_data:/var/lib/ohd-storage
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      OHD_OAUTH_PROVIDER_OHD_ACCOUNT_CLIENT_ID: ${OHD_OAUTH_PROVIDER_OHD_ACCOUNT_CLIENT_ID:-ohd-storage-cloud}
      OHD_OAUTH_PROVIDER_OHD_ACCOUNT_CLIENT_SECRET: ${OHD_OAUTH_PROVIDER_OHD_ACCOUNT_CLIENT_SECRET:-}
    networks:
      - ohd-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --post-data='{}' --header='Content-Type: application/json' http://localhost:8443/ohdc.v0.OhdcService/Health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  ohd-relay:
    build:
      context: ../../
      dockerfile: relay/deploy/Dockerfile
    image: ohd-relay:dev
    container_name: ohd-relay
    restart: unless-stopped
    expose:
      - "8443"
    ports:
      # Raw QUIC tunnel ALPN ohd-tnl1 — exposed directly on the host so
      # storage clients can reach it without going through Caddy.
      - "9001:9001/udp"
    volumes:
      - relay_data:/var/lib/ohd-relay
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    networks:
      - ohd-net

  # ohd-mcp standalone container retired. The SaaS MCP surface lives on
  # ohd-storage-server itself (POST /mcp); Caddy at mcp.ohd.dev is now an
  # alias to that route. See mcp.rs + wire layer in ohd-mcp-core.

  ohd-saas:
    build:
      context: ../../
      dockerfile: saas/deploy/Dockerfile
    image: ohd-saas:dev
    container_name: ohd-saas
    restart: unless-stopped
    expose:
      - "8444"
    volumes:
      - saas_data:/var/lib/ohd-saas
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # MUST be overridden in production via .env — Caddyfile references it
      # implicitly for token signing. Dev fallback is the default in main.rs.
      OHD_SAAS_JWT_SECRET: ${OHD_SAAS_JWT_SECRET:-dev-only-replace-me}
    networks:
      - ohd-net

  # OHD CORD — conversational agent web service. Profiled: it only starts
  # with `docker compose --profile cord up`, because it needs a real
  # cord.toml (mounted below) plus the OHD_CORD_* secrets before it can
  # bind. See cord/SPEC.md.
  ohd-cord:
    build:
      context: ../../
      dockerfile: cord/deploy/Dockerfile
    image: ohd-cord:dev
    container_name: ohd-cord
    restart: unless-stopped
    profiles: ["cord"]
    expose:
      - "8446"
    volumes:
      - cord_data:/var/lib/ohd-cord
      - ./cord.toml:/etc/ohd-cord/cord.toml:ro
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      OHD_CORD_SESSION_SECRET: ${OHD_CORD_SESSION_SECRET:-}
      OHD_CORD_DATA_KEY: ${OHD_CORD_DATA_KEY:-}
      OHD_CORD_ANTHROPIC_KEY: ${OHD_CORD_ANTHROPIC_KEY:-}
      OHD_CORD_OIDC_OHD_SECRET: ${OHD_CORD_OIDC_OHD_SECRET:-}
    networks:
      - ohd-net

  # OHD Identity — the OpenID Connect provider for accounts.ohd.dev.
  # Profiled: it only starts with `docker compose --profile idp up`,
  # because it needs a real idp.toml (mounted below) plus the
  # OHD_IDP_CLIENT_* RP secrets before it serves a useful login. The
  # RS256 signing key is generated into the named volume on first start
  # and reused after, so issued id_tokens keep verifying. See idp/SPEC.md.
  ohd-idp:
    build:
      context: ../../
      dockerfile: idp/deploy/Dockerfile
    image: ohd-idp:dev
    container_name: ohd-idp
    restart: unless-stopped
    profiles: ["idp"]
    expose:
      - "8447"
    volumes:
      - idp_data:/var/lib/ohd-idp
      # Shared mount of the saas database (read-write). The IdP federates
      # account lookups off saas's `profiles` + `email_credentials`
      # tables (see `idp.toml::store.saas_db`) and ALSO writes to them on
      # signup — the IdP is currently the canonical signup path, not a
      # passive reader. Read-only would make /signup fail with "inserting
      # profiles row" because SQLite rejects writes through a ro mount.
      - saas_data:/var/lib/ohd-saas
      - ./idp.toml:/etc/ohd-idp/idp.toml:ro
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      OHD_IDP_CLIENT_CORD_SECRET: ${OHD_IDP_CLIENT_CORD_SECRET:-}
      # Storage AS as an OIDC RP — idp.toml's `ohd-storage-cloud` client
      # entry references this env var via `client_secret_env`. Must equal
      # OHD_OAUTH_PROVIDER_OHD_ACCOUNT_CLIENT_SECRET on the storage side
      # for the upstream code-exchange to validate.
      OHD_IDP_CLIENT_STORAGE_SECRET: ${OHD_IDP_CLIENT_STORAGE_SECRET:-}
    networks:
      - ohd-net

  caddy:
    image: caddy:2-alpine
    container_name: ohd-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 to clients, terminated at Caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../landing:/srv/ohd-landing:ro
      - /var/www/ohd-downloads:/srv/ohd-downloads:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ohd-net
    depends_on:
      - ohd-storage
      - ohd-relay
      - ohd-saas

volumes:
  storage_data:
    name: ohd_storage_data
  relay_data:
    name: ohd_relay_data
  saas_data:
    name: ohd_saas_data
  cord_data:
    name: ohd_cord_data
  idp_data:
    name: ohd_idp_data
  caddy_data:
  caddy_config:

networks:
  ohd-net:
    name: ohd-net
    driver: bridge
