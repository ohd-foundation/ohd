# OHD Connect Android — build + test workflow.
#
# OFFLINE-ONLY: this workflow is **not enabled in CI yet**. It's checked in so
# that the moment we flip GitHub Actions on for the repo there's a known-good
# pipeline waiting. The local equivalents (`./gradlew :app:assembleDebug`,
# `:app:test`, `:app:connectedDebugAndroidTest`) are what every contributor
# runs by hand today.
#
# When we do enable CI, the three jobs below cover:
#  - `build`  : `:app:assembleDebug`         — verifies the APK still builds
#                                               (catches kotlinc / R8 / NDK
#                                               incompatibilities).
#  - `unit`   : `:app:test`                  — JUnit + Paparazzi
#                                               (verifyPaparazziDebug).
#  - `device` : `:app:connectedDebugAndroidTest`
#                                               on a managed AVD via
#                                               ReactiveCircus/android-emulator-runner.
#
# The `connect/android` working directory is referenced explicitly because
# the rest of the OHD monorepo (storage/, deploy/, landing/) has its own
# build tooling and we don't want a single workflow to cross-cut them.
#
# Caching: gradle-build-action's caching is opt-in via cache: 'gradle'. We
# cache `~/.gradle/caches` and `app/build/intermediates` for incremental
# wins; the AVD snapshot cache is keyed off the api-level/target/arch tuple
# so a CPU-arch flip invalidates it cleanly.

name: connect-android

on:
  workflow_dispatch:
  # Disabled — flip the line below to `pull_request:` once CI is enabled.
  # pull_request:
  #   paths:
  #     - 'connect/android/**'
  #     - '.github/workflows/android.yml'

defaults:
  run:
    working-directory: connect/android

jobs:
  # ---------------------------------------------------------------------------
  # 1. APK build sanity. Cheapest job, runs first; subsequent jobs short-
  #    circuit on a build break. No NDK / Rust core needed because the
  #    .so files live under `app/src/main/jniLibs/` already.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :app:assembleDebug

  # ---------------------------------------------------------------------------
  # 2. Unit tests + Paparazzi snapshot regression. `:app:test` runs both the
  #    plain JUnit tests and the Paparazzi `verify*` task because
  #    paparazzi-gradle-plugin wires `verifyPaparazziDebug` as a dependency
  #    of the standard test task on the debug variant.
  #
  #    Snapshots are bitmap-compared — we upload the diff PNGs as an
  #    artifact so a reviewer can eyeball the regression without re-running
  #    locally. Threshold tweaks live in `app/build.gradle.kts` (none yet).
  # ---------------------------------------------------------------------------
  unit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :app:test :app:verifyPaparazziDebug
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: paparazzi-failures
          path: connect/android/app/out/failures/

  # ---------------------------------------------------------------------------
  # 3. Instrumentation smoke test (`SmokeTest.kt`) on a managed AVD.
  #
  #    api-level 34 / google_apis / x86_64 mirrors the local AVD `basta_test`
  #    so the same screens render the same way (HOME / LOG / HISTORY /
  #    SETTINGS plus the four loggers + operator stack).
  #
  #    KVM is required for x86_64 emulation; ReactiveCircus's runner action
  #    enables it via `/dev/kvm` device access on the GitHub-hosted runner.
  # ---------------------------------------------------------------------------
  device:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumentation tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          working-directory: connect/android
          script: ./gradlew :app:connectedDebugAndroidTest
